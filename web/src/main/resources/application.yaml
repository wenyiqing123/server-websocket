spring:
  application:
    name: server-websocket
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090 # 控制台地址
        port: 8719 # 客户端监控端口（如果被占用会自动+1扫描）
  mail:
    host: smtp.qq.com
    port: 465
    username: 2402317148@qq.com
    password: gfhmjyhutnhrdieh
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: auto
  web:
    resources:
      static-locations:
        - file:${user.dir}/upload/

  # 🌟 修复缩进：mvc 必须在 spring 下面，往左退 2 格
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # 🌟 修复缩进：datasource 必须在 spring 下面，往左退 2 格
  datasource:
    url: jdbc:mysql://localhost:3306/chat?useSSL=false&serverTimezone=UTC
    username: root
    password: yq040809
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 🌟 修复缩进：data (Redis) 必须在 spring 下面，往左退 2 格
  data:
    redis:
      database: 1      # 💡 注意：你用的是 1 号数据库
      host: localhost
      port: 6379
      password:
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

