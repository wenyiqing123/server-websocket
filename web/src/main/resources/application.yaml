spring:
  application:
    name: server-websocket
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090 # 控制台地址
        port: 8719 # 客户端监控端口（如果被占用会自动+1扫描）
  mail:
    host: smtp.qq.com
    port: 465
    username: 2402317148@qq.com
    password: gfhmjyhutnhrdieh
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: auto
  web:
    resources:
      static-locations:
        - file:${user.dir}/upload/

  # 🌟 修复缩进：mvc 必须在 spring 下面，往左退 2 格
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # 🌟 修复缩进：datasource 必须在 spring 下面，往左退 2 格
  datasource:
    url: jdbc:mysql://localhost:3306/chat?useSSL=false&serverTimezone=UTC
    username: root
    password: yq040809
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 🌟 修复缩进：data (Redis) 必须在 spring 下面，往左退 2 格
  data:
    redis:
      database: 1      # 💡 注意：你用的是 1 号数据库
      host: localhost
      port: 6379
      password:
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1
  ai:
    zhipuai:
      # 🚨 将这里替换成你刚才在智谱官网复制的真实 API Key
      api-key: 086ec700528b4294960b676ca39817c4.20Yz03TDsZSyGns0
      chat:
        options:
          # 指定使用免费的 flash 模型
          model: glm-4-flash
          # 设定为 0.7 让她的回答更有创造力和感情
          temperature: 0.7
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        options:
#          # 🚨 核心：这里填入你在 Ollama 中拉取好的模型名称
#          # 比如：llama3, qwen2.5:7b, deepseek-r1:1.5b
#          model: qwen2.5:3b
#          # 可选配置：控制模型回答的创造性，0 比较严谨，1 比较天马行空
#          temperature: 0.7
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: cn.wyq.serverwebsocket.pojo.entity,cn.wyq.serverwebsocket.socket.pojo

logging:
  config: classpath:log4j2_dev.xml
  pattern:
    console: '%clr(%d{yyyyMMdd HH:mm:ss}){yellow} [%clr(%thread){red}] %-5level --- %clr(%logger){blue} | %msg%n'

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  port: 8000

# 🌟 修复跨平台路径
image:
  mapping: /file/
  location: ${user.dir}/upload/