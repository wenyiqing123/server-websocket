mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: cn.wyq.serverwebsocket.pojo.entity,cn.wyq.serverwebsocket.socket.pojo

logging:
  config: classpath:log4j2_dev.xml
  pattern:
    console: '%clr(%d{yyyyMMdd HH:mm:ss}){yellow} [%clr(%thread){red}] %-5level --- %clr(%logger){blue} | %msg%n'

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  port: 8000

# 🌟 修复跨平台路径
image:
  mapping: /file/
  location: ${user.dir}/upload/