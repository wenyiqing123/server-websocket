spring:
  mail:
    host: smtp.qq.com       # QQ邮箱的SMTP服务器地址 (163是 smtp.163.com)
    port: 465               # 开启 SSL 后的标准端口
    username: 2402317148@qq.com # 你的发件邮箱账号
    password: gfhmjyhutnhrdieh # 🚨 绝对警告：这里填的不是你的QQ密码！是 SMTP 授权码！
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true    # 必须开启 SSL，否则连不上腾讯服务器
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 开启确认机制（可选，进阶后很有用）
    publisher-confirm-type: correlated
    publisher-returns: true

    listener:
      simple:
        # 🔥 核心多线程配置：最少 3 个消费者，最多 10 个
        concurrency: 3
        max-concurrency: 10
        # 🔥 公平分发：每个消费者每次只拿 1 个任务，处理完再拿
        prefetch: 1
        # 自动签收（默认），新手建议先用自动
        acknowledge-mode: auto
  web:
    resources:
      static-locations:
        - file:D:/javawork/websocket/server-websocket/src/main/resources/static/upload/

  # ===========================
  # SpringDoc-OpenAPI 配置示例
  # ===========================
  springdoc:
    swagger-ui:
      # 自定义 Swagger 前端访问路径。
      # 例如访问 http://localhost:8000/swagger-ui
      # 会自动重定向到 Swagger 可视化页面。
      path: /doc.html
      # 对标签 (tags) 进行排序，alpha 表示按字母顺序排序。
      tags-sorter: alpha
      # 对接口 (operations) 进行排序，alpha 表示按字母顺序排序。
      operations-sorter: alpha
    api-docs:
      # Swagger/OpenAPI 的后端文档请求地址。
      # 通常用于前端 Swagger-UI 获取接口定义。
      path: /v3/api-docs
      # 是否启用接口文档功能。
      # 设置为 false 可在生产环境关闭接口文档。
      enabled: true
    group-configs:
      # -------- 分组配置开始 --------
      # 当项目接口较多或模块化较强时，
      # 可以通过分组来分别展示不同模块的接口文档。
      - group: 'default'              # 分组名称（默认组）
        paths-to-match: '/**'         # 匹配的接口路径（支持通配符）
        packages-to-scan: cn.wyq.serverwebsocket   # 要扫描的包路径，一般为启动类所在包
      # - group: 'admin-api'           # （示例）另一个分组，可按需启用
      #   paths-to-match: '/admin/**'  # 仅扫描 /admin 路径下的接口
      #   packages-to-scan: com.example.newtest.admin  # 扫描 admin 模块包
    mvc:
      pathmatch:
        matching-strategy: ant_path_matcher
  # mysql数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/chat?useSSL=false&serverTimezone=UTC
    username: root
    password: yq040809
    driver-class-name: com.mysql.cj.jdbc.Driver
  # redis数据库配置
  data:
    redis:
      # redis数据库索引(默认为0)
      database: 1
      # redis服务器地址（默认为localhost）
      host: localhost
      # redis端口（默认为6379）
      port: 6379
      # redis访问密码（默认为空）
      password:
      # redis连接超时时间（单位毫秒）:不能设置为0，否则报无法连接
      timeout: 6000ms
      # redis高级客户端
      lettuce:
        pool:
          # 最大可用连接数（默认为8，负数表示无限）
          max-active: 8
          # 最大空闲连接数（默认为8，负数表示无限）
          max-idle: 8
          # 最小空闲连接数（默认为0，该值只有为正数才有用）
          min-idle: 0
          # 从连接池中获取连接最大等待时间（默认为-1，单位为毫秒，负数表示无限）
          max-wait: -1
# mybatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  # 💡 1. 扫描所有模块下的 xml 文件
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 💡 2. 告诉 MyBatis 去哪里找实体类别名（重点加上 socket.pojo）
  type-aliases-package: cn.wyq.serverwebsocket.pojo.entity,cn.wyq.serverwebsocket.socket.pojo
# 日志
logging:
  # 配置
  config: classpath:log4j2_dev.xml
  pattern:
    # 控制台输出颜色
    console: '%clr(%d{yyyyMMdd HH:mm:ss}){yellow} [%clr(%thread){red}] %-5level --- %clr(%logger){blue} | %msg%n'
# 端口
server:
  servlet:
    encoding:
      charset: UTF-8
      force: true      # 🔥 必须加这一行！强制覆盖默认编码
      enabled: true
    multipart:
      max-file-size: 10MB       # 单个文件最大限制
      max-request-size: 10MB    # 单次请求总数据最大限制
  port: 8000
image:
  # 等一下看 用找个的地方
  mapping: /file/
  location: D:\javawork\websocket\server-websocket\src\main\resources\static\upload\


